<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory</title>
    <link rel="stylesheet" href="css/employeeDirectory.css">
</head>
<body>

<div class="container">
    <div class="page-header">
        <div>
            <h1>Employee Directory</h1>
            <p>View employee details, add new employees, and update roles.</p>
        </div>

        <div class="header-actions">
            <button
    id="togglePromoteBtn"
    class="add-btn"
>
    Change Role
</button>
            <a href="admin.html" class="nav-btn">Go to Dashboard</a>
            <button id="toggleAddEmployeeBtn" class="add-btn">+ Add Employee</button>
        </div>
    </div>
    
    <p id="responseMessage" class="response-message" aria-live="polite"></p>

    <div class="panel form-box" id="addEmployeePanel" hidden>
        <div class="form-header">
            <div>
                <h2>Add Employee</h2>
                <p>Provide employee details. Default role is Employee.</p>
            </div>
        </div>
    <form id="addEmployeeForm">
    <div class="form-grid">

        <div class="input-group">
            <label for="employeeUser">Select User</label>
            <select id="employeeUser" required>
                <option value="">Select User</option>
            </select>
        </div>

        <div class="input-group">
            <label for="employeeDepartment">Department</label>
            <select id="employeeDepartment" required>
                <option value="">Select Department</option>
            </select>
        </div>

        <div class="input-group status-group">
            <label>Status</label>

            <div class="status-options">
                <label>
                    <input
                        type="radio"
                        name="employeeStatus"
                        value="Active"
                        checked
                    >
                    Active
                </label>

                <label>
                    <input
                        type="radio"
                        name="employeeStatus"
                        value="Inactive"
                    >
                    Inactive
                </label>
            </div>
        </div>

    </div>

    <div class="form-actions">
        <button
            type="button"
            id="cancelAddBtn"
            class="cancel-btn"
        >
            Cancel
        </button>

        <button
            type="submit"
            class="save-btn"
        >
            Add Employee
        </button>
    </div>
</form>
    </div>

    <div class="panel form-box" id="promotePanel" hidden>
        <div class="form-header">
            <div>
                <h2>Promote Employee</h2>
                <p>Choose an employee and assign a new role.</p>
            </div>
        </div>
        <form id="promoteForm">
            <div class="form-grid">
                <div class="input-group">
                    <label for="selectEmployee">Select Employee</label>
                    <select id="selectEmployee" required>
                        <option value="">Choose employee</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="selectRole">Select Role</label>
                    <select id="selectRole" required>
                        <option value="">Choose role</option>
                        <option>Employee</option>
                        <option>Department Head</option>
                        <option>Asset Manager</option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" id="cancelPromoteBtn" class="cancel-btn">Cancel</button>
                <button type="submit" class="save-btn">Update Role</button>
            </div>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Employee Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="employeeTable">
               
               
            </tbody>
        </table>
    </div>
</div>

<script src="js/employeeDirectory.js"></script>
</body>
</html>
