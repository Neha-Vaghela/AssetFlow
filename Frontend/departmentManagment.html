<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Management</title>
    <link rel="stylesheet" href="css/departmentManagment.css">
</head>
<body>

<div class="container">

    <!-- Page Header -->
    <div class="page-header">

        <div>
            <h1>Department Management</h1>
            <p>Manage departments within the organization.</p>
        </div>

        <div class="header-actions">
            <a href="admin.html" class="nav-btn">Dashboard</a>
            <button id="toggleFormBtn" class="add-btn">
                + Add Department
            </button>
        </div>

        <p id="responseMessage" class="response-message" aria-live="polite"></p>
    </div>

    <div class="panel form-box" id="addDepartmentPanel" hidden>
        <h2>🆕 Add New Department</h2>
        <form id="departmentForm">
            <div class="form-grid">
                <div class="input-group">
                    <label for="departmentName">Department Name</label>
                    <input type="text" id="departmentName" placeholder="Enter Department Name" required>
                </div>

                <div class="input-group">
                    <label for="departmentHead">Department Head</label>
                    <select id="departmentHead" required>
                        <option value="">Select Department Head</option>
                        <option>Rahul Patel</option>
                        <option>Priya Shah</option>
                        <option>Amit Kumar</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="parentDepartment">Parent Department</label>
                    <select id="parentDepartment">
                        <option value="">None</option>
                        <option>Administration</option>
                        <option>IT</option>
                        <option>HR</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Status</label>
                    <div class="status-options">
                        <label><input type="radio" name="status" value="Active" checked> Active</label>
                        <label><input type="radio" name="status" value="Inactive"> Inactive</label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" id="cancelBtn" class="cancel-btn">Cancel</button>
                <button type="submit" class="save-btn">Save Department</button>
            </div>
        </form>
    </div>

    <!-- Department Table -->

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Department Name</th>

                    <th>Department Head</th>

                    <th>Parent Department</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="departmentTable">

                <tr>

                    <td>Information Technology</td>

                    <td>Rahul Patel</td>

                    <td>-</td>

                    <td>
                        <span class="active">
                            Active
                        </span>
                    </td>

                    <td>

                        <button class="edit-btn">
                            Edit
                        </button>

                        <button class="deactivate-btn">
                            Deactivate
                        </button>

                    </td>

                </tr>

                <tr>

                    <td>Human Resources</td>

                    <td>Priya Shah</td>

                    <td>Administration</td>

                    <td>

                        <span class="inactive">

                            Inactive

                        </span>

                    </td>

                    <td>

                        <button class="edit-btn">

                            Edit

                        </button>

                        <button class="activate-btn">

                            Activate

                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>
    const toggleFormBtn = document.getElementById('toggleFormBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const addDepartmentPanel = document.getElementById('addDepartmentPanel');
    const form = document.getElementById('departmentForm');
    const responseMessage = document.getElementById('responseMessage');

    function toggleForm() {
        const isHidden = addDepartmentPanel.hasAttribute('hidden');
        if (isHidden) {
            addDepartmentPanel.removeAttribute('hidden');
            toggleFormBtn.textContent = '− Close Form';
        } else {
            addDepartmentPanel.setAttribute('hidden', '');
            toggleFormBtn.textContent = '+ Add Department';
        }
    }

    function closeForm() {
        addDepartmentPanel.setAttribute('hidden', '');
        toggleFormBtn.textContent = '+ Add Department';
    }

    function showSuccess(message) {
        responseMessage.textContent = message;
        responseMessage.classList.add('visible');
        setTimeout(() => responseMessage.classList.remove('visible'), 4000);
    }

    toggleFormBtn.addEventListener('click', toggleForm);
    cancelBtn.addEventListener('click', closeForm);

    form.addEventListener('submit', function(event) {
        event.preventDefault();

        const name = document.getElementById('departmentName').value.trim();
        const head = document.getElementById('departmentHead').value;
        const status = document.querySelector('input[name="status"]:checked').value;

        if (!name || !head) {
            return;
        }

        form.reset();
        closeForm();
        showSuccess('Department created successfully');
    });
</script>
<script src="js/departmentManagment.js"></script>

</body>
</html>
