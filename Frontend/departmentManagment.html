<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Management</title>
    <link rel="stylesheet" href="css/departmentManagment.css">
</head>
<body>

<div class="container">

    <!-- Page Header -->
    <div class="page-header">

        <div>
            <h1>Department Management</h1>
            <p>Manage departments within the organization.</p>
        </div>

        <div class="header-actions">
            <a href="admin.html" class="nav-btn">Dashboard</a>

            <button id="toggleFormBtn" class="add-btn">
                + Add Department
            </button>
        </div>

        <p id="responseMessage" class="response-message" aria-live="polite"></p>

    </div>

    <!-- Add Department Form -->

    <div class="panel form-box" id="addDepartmentPanel" hidden>

        <h2>🆕 Add New Department</h2>

        <form id="departmentForm">

            <div class="form-grid">

                <!-- Department Name -->

                <div class="input-group">

                    <label for="departmentName">
                        Department Name
                    </label>

                    <input
                        type="text"
                        id="departmentName"
                        placeholder="Enter Department Name"
                        required
                    >

                </div>

                <!-- Department Head -->

                <div class="input-group">

                    <label for="departmentHead">
                        Department Head
                    </label>

                    <select id="departmentHead" required>

                        <option value="">
                            Select Department Head
                        </option>

                    </select>

                </div>

                <!-- Parent Department -->

                <div class="input-group">

                    <label for="parentDepartment">
                        Parent Department
                    </label>

                    <select id="parentDepartment">

                        <option value="">
                            None
                        </option>

                    </select>

                </div>

                <!-- Status -->

                <div class="input-group">

                    <label>Status</label>

                    <div class="status-options">

                        <label>
                            <input
                                type="radio"
                                name="status"
                                value="Active"
                                checked
                            >
                            Active
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="status"
                                value="Inactive"
                            >
                            Inactive
                        </label>

                    </div>

                </div>

            </div>

            <div class="form-actions">

                <button
                    type="button"
                    id="cancelBtn"
                    class="cancel-btn"
                >
                    Cancel
                </button>

                <button
                    type="submit"
                    class="save-btn"
                >
                    Save Department
                </button>

            </div>

        </form>

    </div>

    <!-- Department Table -->

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Department Name</th>

                    <th>Department Head</th>

                    <th>Parent Department</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <!-- Dynamic Data Will Come Here -->

            <tbody id="departmentTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/departmentManagment.js"></script>

</body>
</html>
