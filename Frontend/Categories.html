<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Category Management</title>
    <link rel="stylesheet" href="css/AdminDashboard.css">
    <link rel="stylesheet" href="css/Categories.css">
</head>
<body>

    <div class="categories-container">
        <div class="categories-header">
            <h2>Asset Category Management</h2>
           <a href="AdminDashboard.html">
    <button class="add-cat-btn" id="goDashboardBtn">Go to Dashboard</button>
</a> 
            <button class="add-cat-btn" id="openAddModalBtn">+ Add Category</button>
        </div>

        <div id="toastNotification" class="toast hidden">Category added successfully!</div>

        <div class="card table-card">
            <h3>Active System Categories</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Category Name</th>
                            <th>Custom/Optional Field</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTableBody">
                        <tr data-id="1">
                            <td class="cat-name">Electronics / Laptops</td>
                            <td class="cat-field">Warranty Period: 3 Years</td>
                            <td><span class="status badge-active">Active</span></td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-edit">Edit</button>
                                </div>
                            </td>
                        </tr>
                        <tr data-id="2">
                            <td class="cat-name">Furniture / Desk Chairs</td>
                            <td class="cat-field">Material: Ergonomic Mesh</td>
                            <td><span class="status badge-active">Active</span></td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-edit">Edit</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="categoryModal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Category</h3>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <form id="categoryForm">
                <input type="hidden" id="categoryId">
                
                <div class="form-group">
                    <label for="categoryName">Category Name</label>
                    <input type="text" id="categoryName" placeholder="e.g., Projectors" required />
                </div>

                <div class="form-group">
                    <label for="optionalField">Optional Custom Field (e.g., Warranty, Specs)</label>
                    <input type="text" id="optionalField" placeholder="e.g., Warranty Period: 2 Years" />
                </div>

                <div class="form-group">
                    <label for="categoryStatus">Status</label>
                    <select id="categoryStatus" required>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" id="saveBtn">Save Category</button>
            </form>
        </div>
    </div>

    <script src="js/Categories.js"></script>
</body>
</html>
