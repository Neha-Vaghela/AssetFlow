<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Category Management</title>
    <link rel="stylesheet" href="css/assetCategory.css">
</head>
<body>

<div class="container">

    <!-- Page Header -->

    <div class="page-header">

        <div>
            <h1>Asset Category Management</h1>
            <p>
                Review categories, add new types,
                and update existing asset fields.
            </p>
        </div>

        <div class="header-actions">

            <a href="admin.html" class="nav-btn">
                Dashboard
            </a>

            <button id="toggleFormBtn" class="add-btn">
                + Add Category
            </button>

        </div>

    </div>

    <p
        id="responseMessage"
        class="response-message"
        aria-live="polite"
    ></p>

    <!-- Add / Edit Category Form -->

    <div
        class="panel form-box"
        id="categoryFormPanel"
        hidden
    >

        <div class="form-header">

            <div>

                <h2 id="formTitle">
                    Add New Category
                </h2>

                <p id="formSubtitle">
                    Enter category details and optional field information.
                </p>

            </div>

        </div>

        <form id="categoryForm">

            <div class="form-grid">

                <!-- Category Name -->

                <div class="input-group">

                    <label for="categoryName">
                        Category Name
                    </label>

                    <input
                        type="text"
                        id="categoryName"
                        placeholder="Enter Category Name"
                        required
                    >

                </div>

                <!-- Optional Field -->

                <div class="input-group">

                    <label for="optionalField">
                        Optional Category Field
                    </label>

                    <input
                        type="text"
                        id="optionalField"
                        placeholder="e.g. Warranty Period for Electronics"
                    >

                </div>

                <!-- Status -->

                <div class="input-group status-group">

                    <label>Status</label>

                    <div class="status-options">

                        <label>
                            <input
                                type="radio"
                                name="status"
                                value="Active"
                                checked
                            >
                            Active
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="status"
                                value="Inactive"
                            >
                            Inactive
                        </label>

                    </div>

                </div>

            </div>

            <div class="form-actions">

                <button
                    type="button"
                    id="cancelBtn"
                    class="cancel-btn"
                >
                    Cancel
                </button>

                <button
                    type="submit"
                    class="save-btn"
                >
                    Save Category
                </button>

            </div>

        </form>

    </div>

    <!-- Category Table -->

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Category Name</th>

                    <th>Optional Field</th>

                    <th>Status</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <!-- Dynamic Categories -->

            <tbody id="categoryTable">

            </tbody>

        </table>

    </div>

</div>

<script src="js/assetCategory.js"></script>

</body>
</html>
